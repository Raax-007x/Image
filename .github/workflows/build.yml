name: Auto-Generate & Build APK ✅

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🦋 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: ✨ Generate Fresh Android Project
        run: flutter create --platforms android .

      - name: 💉 Auto-Inject Android Manifest
        run: |
          cat << 'EOF' > android/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.WAKE_LOCK"/>
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_SPECIAL_USE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_DATA_SYNC" />

              <application
                  android:label="child_monitor"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                        android:name="io.flutter.embedding.android.NormalTheme"
                        android:resource="@style/NormalTheme" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
                      
                  <service
                      android:name="com.pravera.flutter_foreground_task.models.ForegroundService"
                      android:foregroundServiceType="specialUse"
                      android:exported="false" />
                  <service
                      android:name="com.pravera.flutter_foreground_task.models.ForegroundServiceActionReceiver"
                      android:exported="false" />
              </application>
          </manifest>
          EOF

      # ERROR FIXED: CompileSdk aur TargetSdk ko 36 kiya hai naye plugins ke liye
      - name: 🛠️ Auto-Fix build.gradle versions to SDK 36
        run: |
          sed -i 's/flutter.minSdkVersion/24/g' android/app/build.gradle
          sed -i 's/flutter.compileSdkVersion/36/g' android/app/build.gradle
          sed -i 's/flutter.targetSdkVersion/36/g' android/app/build.gradle

      - name: 📦 Install Dependencies
        run: flutter pub get

      - name: 🚀 Build Release APK
        run: flutter build apk --release

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Child-Monitor-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
