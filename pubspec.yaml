name: child_monitor
description: A Flutter app that plays videos via Telegram bot commands.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  video_player: ^2.8.3
  flutter_foreground_task: ^7.0.0
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  wakelock_plus: ^1.2.0
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true